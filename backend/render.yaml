# render.yaml — Render Blueprint for BUZZ-ROOT Backend
# Deploy with: https://render.com/deploy

services:
  - type: web
    name: buzz-root-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buzz-root-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SEED_DEMO
        value: "false"
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false

databases:
  - name: buzz-root-db
    plan: free
